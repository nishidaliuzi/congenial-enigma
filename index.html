<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品展示 | 匠心设计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        。gradient-bg { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        。card-hover:hover { transform: translateY(-5px); transition: 全部 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter text-blue-600">MEI DESIGN</h1>
        <div class="space-x-6 text-sm font-medium">
            <a href=" " class="hover:text-blue-500">案例展示</a >
            <a href="#" class="hover:text-blue-500">技术说明</a >
            <a href="mailto:your@email.com" class="bg-blue-600 text-white px-4 py-2 rounded-full">联系我</a >
        </div>
    </nav>

    <header class="py-20 px-6 text-center gradient-bg">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">精密浮雕与 3D 建模展示</h2>
        <p class="text-gray-600 max-w-2xl mx-auto text-lg">
            专注于文旅香薰、建筑浮雕及工业级 3D 模型设计。提供从平面构思到 3D 翻模的一站式视觉方案。
        </p >
    </header>

    <section class="max-w-6xl mx-auto py-16 px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-xl overflow-hidden shadow-lg card-hover">
                <div class="h-64 bg-gray-200 flex items-center justify-center text-gray-400">
                    <span>[ 浮雕正面图 ]</span>
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-xl mb-2">建筑浮雕系列</h3>
                    <p class="text-gray-500 text-sm">高精度 0.8cm 深度控制，适合石膏翻模与扩香石制作。</p >
                </div>
            </div>

            <div class="bg-white rounded-xl overflow-hidden shadow-lg card-hover">
                <div class="h-64 bg-gray-200 flex items-center justify-center text-gray-400">
                    <span>[ 3D 轴测图 ]</span>
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-xl mb-2">技术可视化</h3>
                    <p class="text-gray-500 text-sm">提供精准的四面轴测图，方便客户多角度审校设计细节。</p >
                </div>
            </div>

            <div class="bg-white rounded-xl overflow-hidden shadow-lg card-hover">
                <div class="h-64 bg-gray-200 flex items-center justify-center text-gray-400">
                    <span>[ 渲染效果图 ]</span>
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-xl mb-2">材质渲染</h3>
                    <p class="text-gray-500 text-sm">柔和工作室灯光效果，完美还原真实物理质感。</p >
                </div>
            </div>

        </div>
    </section>

    <footer class="py-10 text-center border-t border-gray-200">
        <p class="text-gray-400 text-sm">© 2026 Mei Runzhi Design. All Rights Reserved.</p >
    </footer>

</body>
</html>
